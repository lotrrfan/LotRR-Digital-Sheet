<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LotRR Digital Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Bilbo+Swash+Caps&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #2a2a2a; 
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            padding-bottom: 95px; 
            overflow-x: hidden; 
        }
        
        .sheet-container {
            position: absolute; 
            top: 0;
            left: 50%;
            width: 100%;
            max-width: 1000px; 
            transform: translateX(-50%);
            transition: opacity 0.2s ease-out;
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            container-type: inline-size; 
        }

        .sheet-container.hidden-left,
        .sheet-container.hidden-right { opacity: 0; pointer-events: none; visibility: hidden; }
        .sheet-container.active-page { position: relative !important; }
        
        .sheet-bg { width: 100%; height: auto; display: block; }

        .sheet-input {
            position: absolute;
            font-family: 'Bilbo Swash Caps', cursive; 
            font-weight: bold; font-size: 1.6cqw; color: #000000; 
            padding: 0 2px; box-sizing: border-box; text-align: center;
            background-color: transparent; -webkit-text-size-adjust: 100%;
            appearance: none; border-radius: 0; border: 1px dashed transparent; 
            transition: color 0.2s; 
        }

        .penalty-active, .warning-active { color: #d00000 !important; }
        .advantage-active { color: #27ae60 !important; }

        textarea.sheet-input { text-align: left; padding: 2px 5px; }
        
        .sheet-input.editing-active {
            background-color: rgba(173, 216, 230, 0.2); 
            border: 1px dashed rgba(0, 0, 0, 0.4);
        }

        .sheet-input:focus {
            outline: none; background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #000000; z-index: 10;
        }

        .rollable:not(.editing-active), .clickable-feature:not(.editing-active) {
            cursor: pointer; transition: background-color 0.2s;
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; touch-action: manipulation; 
        }
        .rollable:not(.editing-active):hover, .clickable-feature:not(.editing-active):hover {
            background-color: rgba(212, 175, 55, 0.2); 
        }

        .bonus-input { font-size: 1.1cqw !important; padding: 0 !important; }

        .sheet-checkbox {
            position: absolute; cursor: pointer; color: #000000; 
            font-family: sans-serif; font-weight: bold; font-size: 1cqw; 
            line-height: 1; display: flex; align-items: center;
            justify-content: center; box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }

        .image-checkbox { background-size: contain; background-repeat: no-repeat; background-position: center; }
        #Portrait { cursor: pointer; }

        .hidden { display: none !important; }

        #floating-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; 
            background-color: rgba(42, 42, 42, 0.95); z-index: 2000; display: flex;
            flex-direction: column; align-items: center; justify-content: flex-start;
            overflow-y: auto; padding-top: 40px; padding-bottom: 40px; box-sizing: border-box;
            color: #e0d8c0; font-family: sans-serif;
        }
        #floating-menu h2 { font-family: serif; color: #d4af37; margin-bottom: 20px; }

        .menu-block {
            background-color: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 15px;
            width: 80%; max-width: 400px; text-align: center; border: 1px solid #4a0000; flex-shrink: 0;
        }
        .menu-input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; text-align: center; }
        .menu-btn {
            background-color: #4a0000; color: white; padding: 15px 20px; margin-top: 10px;
            border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold;
        }
        .menu-btn.close { background-color: #333; margin-top: 20px; margin-bottom: 40px; width: 80%; max-width: 400px; flex-shrink: 0; }

        input[type="file"] { display: none; }
        .file-upload-label {
            display: inline-block; background-color: #2c3e50; color: white; padding: 15px 20px; margin-top: 10px;
            border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; box-sizing: border-box;
        }

        #done-editing-btn {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background-color: #27ae60; color: white; padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 30px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #tab-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; z-index: 1000;
        }
        #menu-bar-btn {
            width: 100%; background-color: #2a2a2a; color: #d4af37; border: none; 
            border-top: 2px solid #4a0000; padding: 8px 0; font-family: serif; font-size: 14px; 
            cursor: pointer; letter-spacing: 2px; font-weight: bold; text-align: center;
        }
        #menu-bar-btn:hover { background-color: #3a0000; }
        #tab-bar {
            width: 100%; height: 60px; background-color: #1a1a1a; display: flex; 
            justify-content: space-around; align-items: center; border-top: 1px solid #4a0000;
        }
        .tab-btn { flex-grow: 1; height: 100%; background: none; border: none; color: #888; font-family: serif; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { color: #d4af37; background-color: #2a2a2a; border-top: 4px solid #d4af37; }

        #roll-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 26, 0.98); border: 2px solid #d4af37; border-radius: 12px;
            z-index: 3000; display: flex; flex-direction: column; padding: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            gap: 5px; min-width: 250px;
        }
        .roll-menu-row { display: flex; justify-content: space-between; gap: 8px; }
        .roll-menu-divider { height: 1px; background-color: #4a0000; margin: 8px 0 4px 0; }
        .roll-menu-btn {
            background: none; color: #d4af37; border: 1px solid #4a0000; padding: 12px 15px; font-family: sans-serif;
            font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; border-radius: 6px; flex: 1; background-color: #1a1a1a;
        }
        .roll-menu-btn:hover { background-color: #333; }
        .roll-menu-btn.adv { color: #2ecc71; border-color: #2ecc71;}
        .roll-menu-btn.dis { color: #e74c3c; border-color: #e74c3c;}
        
        .prof-btn { font-size: 14px; color: #888; background: #2a2a2a; border-color: #444; }
        .prof-btn.active { color: #fff; background: #4a0000; border-color: #d4af37; }
        
        .roll-menu-cancel {
            background-color: #333; color: white; border: 1px solid #4a0000; padding: 10px; margin-top: 5px;
            font-family: sans-serif; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; box-sizing: border-box;
        }
        .roll-menu-cancel:hover { background-color: #444; }

        #feature-help-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 26, 0.98); border: 2px solid #d4af37; border-radius: 12px;
            z-index: 4000; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            width: 90%; max-width: 500px; max-height: 80dvh;
        }
        #feature-help-title {
            font-family: serif; color: #d4af37; font-size: 22px; margin-top: 0; margin-bottom: 10px; 
            text-align: center; text-transform: capitalize; border-bottom: 1px solid #4a0000; padding-bottom: 10px;
        }
        #feature-help-desc {
            font-family: sans-serif; font-size: 15px; color: #e0d8c0; line-height: 1.5;
            overflow-y: auto; padding-right: 5px; margin-bottom: 15px; white-space: pre-wrap;
        }

        #backstory-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 26, 0.98); border: 2px solid #d4af37; border-radius: 12px;
            z-index: 5000; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            width: 90%; max-width: 600px;
        }
        #backstory-editor {
            width: 100%; height: 50dvh; background: #1a1a1a; color: #e0d8c0; border: 1px solid #4a0000;
            padding: 10px; font-family: sans-serif; font-size: 16px; resize: none; border-radius: 6px; box-sizing: border-box;
        }
        #backstory-editor:focus { outline: none; border-color: #d4af37; }
        #backstory-warning { color: #ff4d4d; font-family: sans-serif; font-size: 14px; margin-top: 10px; font-weight: bold; text-align: center; }
        .backstory-line.editing-active { cursor: pointer; }

        /* --- HERO LEDGER STYLES --- */
        #hero-ledger-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 26, 0.98); border: 2px solid #d4af37; border-radius: 12px;
            z-index: 6000; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            width: 90%; max-width: 500px; max-height: 80dvh;
        }
        #hero-ledger-list {
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin: 15px 0;
        }
        .hero-card {
            background-color: #1a1a1a; border: 1px solid #4a0000; border-radius: 8px; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hero-info { display: flex; flex-direction: column; }
        .hero-name { font-family: serif; color: #d4af37; font-size: 20px; font-weight: bold; }
        .hero-sub { font-family: sans-serif; color: #e0d8c0; font-size: 14px; margin-top: 4px; }
        .hero-actions { display: flex; gap: 8px; }
        .hero-btn { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; padding: 8px 12px; }
        .load-btn { background-color: #27ae60; color: white; }
        .load-btn:hover { background-color: #2ecc71; }
        .del-btn { background-color: #c0392b; color: white; padding: 8px; }
        .del-btn:hover { background-color: #e74c3c; }

    </style>
</head>
<body> 

    <div id="floating-menu" class="hidden">
        <h2>Module Settings</h2>
        <div class="menu-block">
            <label>Encounter+ IP Connection</label>
            <input type="text" id="ep-address-menu" class="menu-input" placeholder="192.168.1.X:8080">
            <button class="menu-btn" onclick="saveServerAddress()">Connect</button>
        </div>
        <div class="menu-block">
            <label style="color:#d4af37; font-weight:bold;">Custom Dice Roll</label>
            <input type="text" id="custom-roll-input" class="menu-input" placeholder="e.g. 2d6+4">
            <button class="menu-btn" style="background-color: #27ae60;" onclick="sendCustomRoll()">🎲 Roll Dice</button>
        </div>
        <div class="menu-block">
            <button class="menu-btn" style="background-color: #8e44ad;" onclick="openHeroLedger()">📖 Open Hero Ledger</button>
            <button class="menu-btn" onclick="toggleEditMode()">✏️ Edit Character Sheet</button>
            <button class="menu-btn" style="background-color: #2980b9;" onclick="exportCharacter()">💾 Export Current Hero (.json)</button>
            <button class="menu-btn" style="background-color: #2c3e50;" onclick="exportAllCharacters()">💾 Export All Heroes (.json)</button>
            <label class="file-upload-label">
                📂 Import to Ledger (.json)
                <input type="file" id="import-file" accept=".json" multiple onchange="importCharacter(event)">
            </label>
        </div>
        <button class="menu-btn close" onclick="toggleMenu()">Close Menu</button>
    </div>

    <div id="hero-ledger-modal" class="hidden">
        <button class="roll-menu-cancel" style="background-color: #2a2a2a; color: #d4af37; margin-bottom: 10px;" onclick="createNewHero()">📄 Create New Hero</button>
        <h2 style="font-family: serif; color: #d4af37; font-size: 22px; margin-top: 0; text-align: center; border-bottom: 1px solid #4a0000; padding-bottom: 10px;">Hero Ledger</h2>
        <button class="roll-menu-cancel" style="background-color: #27ae60; margin-top: 5px;" onclick="saveCurrentHeroToRoster()">➕ Save Current Hero</button>
        <div id="hero-ledger-list">
            </div>
        <button class="roll-menu-cancel" onclick="closeHeroLedger()">Close</button>
    </div>

    <div id="roll-menu" class="hidden">
        <div class="roll-menu-row">
            <button class="roll-menu-btn adv" onclick="executeMenuRoll('adv')">Advantage</button>
            <button class="roll-menu-btn normal" onclick="executeMenuRoll('normal')">Normal</button>
            <button class="roll-menu-btn dis" onclick="executeMenuRoll('dis')">Disadvantage</button>
        </div>
        <div id="roll-menu-prof-row" class="roll-menu-row" style="margin-top: 5px;">
            <button id="prof-btn-1" class="roll-menu-btn prof-btn" onclick="setRollProfState(1)">Half Prof</button>
            <button id="prof-btn-2" class="roll-menu-btn prof-btn" onclick="setRollProfState(2)">Prof</button>
            <button id="prof-btn-3" class="roll-menu-btn prof-btn" onclick="setRollProfState(3)">Double Prof</button>
        </div>
        <div class="roll-menu-divider"></div>
        <input type="text" id="roll-extra-mod" class="menu-input" placeholder="Extra Mod (+2, -1d4)" style="margin-top: 0; background: #2a2a2a; color: #e0d8c0;">
        <button class="roll-menu-cancel" onclick="closeRollMenu()">Cancel</button>
    </div>

    <div id="feature-help-modal" class="hidden">
        <h2 id="feature-help-title">Feature Title</h2>
        <div id="feature-help-desc">Feature description goes here.</div>
        <button class="roll-menu-cancel" onclick="closeFeatureHelp()">Close</button>
    </div>

    <div id="backstory-modal" class="hidden">
        <h2 style="font-family: serif; color: #d4af37; font-size: 22px; margin-top: 0; text-align: center; border-bottom: 1px solid #4a0000; padding-bottom: 10px;">Character Backstory</h2>
        <textarea id="backstory-editor" placeholder="Write your backstory here..."></textarea>
        <div id="backstory-warning" class="hidden">Warning: Text may be too long to fit cleanly.</div>
        <button class="roll-menu-cancel" style="background-color: #27ae60;" onclick="saveAndCloseBackstory()">Save & Close</button>
    </div>
